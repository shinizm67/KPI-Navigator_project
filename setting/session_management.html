          <li class="global-nav-item"><a href="#" class="nav-frame-btn" aria-label="月間ビューへ"><span class="btn-mode-frame"><img src="../images/button_frame.svg" alt="" class="btn-mode-frame-img" aria-hidden="true"><span class="btn-mode-text nav-btn-text">Monthly</span></span></a></li>

      <div class="account-settings-popup" id="account-settings-popup" role="menu" aria-label="アカウント設定" hidden>
        <h3 class="account-settings-popup-title">Account Settings</h3>
        <section class="account-settings-section">

          <nav class="account-settings-nav">
            <a href="profile.html" class="account-settings-item" role="menuitem">Profile</a>
            <a href="change_email.html" class="account-settings-item" role="menuitem">メールアドレスの変更</a>
            <a href="change_password.html" class="account-settings-item" role="menuitem">パスワードの変更</a>
            <a href="session_management.html" class="account-settings-item is-current" role="menuitem">セッション管理</a>

        <section class="account-settings-section">

        <div class="settings-dropdown-inner">

          <a href="#" class="nav-frame-btn settings-dropdown-item" id="settings-office-toggle" aria-label="Office Mode を切り替え"><span class="btn-mode-frame"><img src="../images/button_frame.svg" alt="" class="btn-mode-frame-img" aria-hidden="true"><span class="btn-mode-text nav-btn-text" id="settings-office-label">Office Mode</span></span></a>

  <div class="page-wrap profile-wrap">
    <main class="profile-main">
      <div class="workspace-selector-wrap">
        <button type="button" class="profile-workspace-indicator" id="workspace-trigger" aria-label="現在のワークスペース" aria-expanded="false" aria-haspopup="true">
          <span class="profile-workspace-icon" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" focusable="false"><path d="M8 5v14l11-7z"/></svg></span>
          <span class="profile-workspace-label">Workspace : Personal</span>
        </button>
        <div class="workspace-popup" id="workspace-popup" role="dialog" aria-label="ワークスペース一覧" hidden>
          <div class="workspace-popup-inner"><div class="workspace-popup-item is-current">Workspace : Personal</div></div>
        </div>
      </div>

      <h1 class="profile-title-main">KPI Navigator</h1>
      <h2 class="profile-title-sub">セッション管理</h2>

      <section class="coming-soon-panel" aria-live="polite">
        <p class="coming-soon-text" id="coming-soon-text">Coming soon</p>
      </section>

  <footer class="site-footer">
    <button class="footer-backtotop" id="footerBackToTop" aria-label="Back to top"><img src="../images/arrow_up.svg" alt="Back to top" class="footer-backtotop__icon"></button>
    <div class="footer-separator"></div>
    <div class="footer-logo"><a href="https://forge-laboratory.com" class="logo-link" aria-label="FORGE LABORATORY - トップページ" target="_blank" rel="noopener noreferrer"><img src="../images/forge_lab_logo.png" alt="FORGE LABORATORY" class="logo-img"></a></div>
    <p class="footer-copy">© 2025 Forge-Laboratory. All rights reserved.</p>
  </footer>

  <div class="lang-select-wrap" id="lang-select-wrap" data-url-en="../en/setting/session_management.html" data-url-ja="session_management.html">
    <button type="button" class="lang-select-btn" id="lang-select-btn" aria-expanded="false" aria-haspopup="listbox" aria-label="言語を選択">
      <span class="lang-code" aria-hidden="true">JP</span>
      <span class="lang-name">Japanese</span>
      <span class="lang-chevron" aria-hidden="true"></span>
    </button>
    <div class="lang-select-dropdown" id="lang-select-dropdown" role="listbox" aria-label="言語オプション" hidden>
      <button type="button" class="lang-option lang-option-ja lang-option-active" role="option" data-lang="ja">JP - Japanese</button>
      <button type="button" class="lang-option lang-option-en" role="option" data-lang="en">EN - English</button>
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = 'kpi-office-mode';
      var bodyEl = document.getElementById('body-el');
      var btnModeToggle = document.getElementById('btn-mode-toggle');
      var btnModeText = document.getElementById('btn-mode-text');
      var settingsOfficeLabel = document.getElementById('settings-office-label');
      function updateModeButton() {
        if (!btnModeText || !btnModeToggle) return;
        var isOffice = bodyEl && bodyEl.classList.contains('office-mode');
        btnModeText.textContent = isOffice ? 'SCI-FI MODE' : 'OFFICE MODE';
        btnModeToggle.setAttribute('aria-label', isOffice ? 'Sci-Fi Mode に切り替え' : 'Office Mode に切り替え');
        if (settingsOfficeLabel) settingsOfficeLabel.textContent = isOffice ? 'Sci-Fi Mode' : 'Office Mode';
      }
      if (bodyEl && btnModeToggle) {
        if (sessionStorage.getItem(STORAGE_KEY) === '1') bodyEl.classList.add('office-mode');
        btnModeToggle.addEventListener('click', function (e) {
          e.preventDefault();
          bodyEl.classList.toggle('office-mode');
          if (bodyEl.classList.contains('office-mode')) sessionStorage.setItem(STORAGE_KEY, '1');
          else sessionStorage.removeItem(STORAGE_KEY);
          updateModeButton();
        });
        updateModeButton();
      }
    })();
    (function () {
      var menuBtn = document.querySelector('.icon-button-menu');
      var dropdown = document.getElementById('settings-dropdown');
      var officeToggle = document.getElementById('settings-office-toggle');
      if (!menuBtn || !dropdown) return;
      menuBtn.addEventListener('click', function (e) { e.stopPropagation(); dropdown.hidden = !dropdown.hidden; });
      if (officeToggle) {
        officeToggle.addEventListener('click', function (e) {
          e.preventDefault(); e.stopPropagation();
          var modeBtn = document.getElementById('btn-mode-toggle');
          if (modeBtn) modeBtn.click();
        });
      }
      dropdown.addEventListener('click', function (e) { e.stopPropagation(); });
      document.addEventListener('click', function () { dropdown.hidden = true; });
    })();
    (function () {
      var gearBtn = document.getElementById('btn-account-settings');
      var accountPopup = document.getElementById('account-settings-popup');
      var menuDropdown = document.getElementById('settings-dropdown');
      if (!gearBtn || !accountPopup) return;
      gearBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = !accountPopup.hidden;
        accountPopup.hidden = isOpen;
        gearBtn.setAttribute('aria-expanded', !isOpen);
        if (!isOpen && menuDropdown) menuDropdown.hidden = true;
      });
      accountPopup.addEventListener('click', function (e) { e.stopPropagation(); });
      document.addEventListener('click', function () {
        accountPopup.hidden = true;
        gearBtn.setAttribute('aria-expanded', 'false');
      });
    })();
    (function () {
      var trigger = document.getElementById('workspace-trigger');
      var popup = document.getElementById('workspace-popup');
      if (!trigger || !popup) return;
      trigger.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = !popup.hidden;
        popup.hidden = isOpen;
        trigger.setAttribute('aria-expanded', !isOpen);
      });
      popup.addEventListener('click', function (e) { e.stopPropagation(); });
      document.addEventListener('click', function () {
        popup.hidden = true;
        trigger.setAttribute('aria-expanded', 'false');
      });
    })();
    (function () {
      var langBtn = document.getElementById('lang-select-btn');
      var langDropdown = document.getElementById('lang-select-dropdown');
      var langOptions = document.querySelectorAll('.lang-option');
      var langWrap = document.getElementById('lang-select-wrap');
      if (!langBtn || !langDropdown || !langWrap) return;
      langBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = !langDropdown.hidden;
        langDropdown.hidden = isOpen;
        langBtn.setAttribute('aria-expanded', !isOpen);
      });
      document.addEventListener('click', function () {
        langDropdown.hidden = true;
        langBtn.setAttribute('aria-expanded', 'false');
      });
      var urlEn = langWrap.getAttribute('data-url-en');
      var urlJa = langWrap.getAttribute('data-url-ja');
      var bodyElForLang = document.getElementById('body-el');
      langOptions.forEach(function (opt) {
        opt.addEventListener('click', function (e) {
          e.stopPropagation();
          if (bodyElForLang && bodyElForLang.classList.contains('office-mode')) {
            sessionStorage.setItem('kpi-office-mode', '1');
          }
          var lang = this.getAttribute('data-lang');
          var href = (lang === 'ja' && urlJa) ? urlJa : (lang === 'en' && urlEn) ? urlEn : null;
          if (href) window.location.href = href;
        });
      });
    })();
    (function () {
      var backTop = document.getElementById('footerBackToTop');
      if (!backTop) return;
      backTop.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
    })();
    (function () {
      var textEl = document.getElementById('coming-soon-text');
      var bodyEl = document.getElementById('body-el');
      if (!textEl || !bodyEl) return;
      var phrases = ['Coming soon', 'Work in Progress', 'Under Construction'];
      var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!?<>[]{}+-_=*';
      var steps = 34;
      var revealDelay = 35;
      var phraseHold = 15000;
      var cyclePause = 15000;
      var index = 0;
      var running = false;
      function randomText(len) {
        var out = '';
        for (var i = 0; i < len; i++) out += chars.charAt(Math.floor(Math.random() * chars.length));
        return out;
      }
      function animatePhrase(target, done) {
        var pos = 0;
        function tick() {
          if (bodyEl.classList.contains('office-mode')) { textEl.textContent = 'Coming soon'; running = false; return; }
          if (pos < steps) {
            textEl.textContent = randomText(target.length);
            pos += 1;
            setTimeout(tick, revealDelay);
            return;
          }
          var revealed = 0;
          function revealTick() {
            if (bodyEl.classList.contains('office-mode')) { textEl.textContent = 'Coming soon'; running = false; return; }
            if (revealed <= target.length) {
              var left = target.slice(0, revealed);
              var right = randomText(Math.max(target.length - revealed, 0));
              textEl.textContent = left + right;
              revealed += 1;
              setTimeout(revealTick, revealDelay);
            } else {
              textEl.textContent = target;
              setTimeout(done, phraseHold);
            }
          }
          revealTick();
        }
        tick();
      }
      function loop() {
        if (running) return;
        if (bodyEl.classList.contains('office-mode')) { textEl.textContent = 'Coming soon'; return; }
        running = true;
        animatePhrase(phrases[index], function () {
          index = (index + 1) % phrases.length;
          running = false;
          setTimeout(loop, cyclePause);
        });
      }
      loop();
      var observer = new MutationObserver(function () {
        running = false;
        loop();
      });
      observer.observe(bodyEl, { attributes: true, attributeFilter: ['class'] });
    })();
  </script>
</body>
</html>
