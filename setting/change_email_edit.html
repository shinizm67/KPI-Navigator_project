  <div class="page-wrap profile-wrap">

        </button>
        <div class="workspace-popup" id="workspace-popup" role="dialog" aria-label="ワークスペース一覧" hidden>

      <h1 class="profile-title-main">KPI Navigator</h1>
      <h2 class="profile-title-sub">メールアドレスの変更</h2>

      <form class="registration-form profile-form" action="#" method="post" id="change-email-form" novalidate>
        <div class="profile-readonly-group email-change-current-wrap">
          <div class="form-group form-group-email-display email-change-current-row">
            <label>Current Email Address :</label>
            <p class="profile-email-value" id="current-email" aria-live="polite">—</p>
          </div>
        </div>

        <div class="profile-editable-group">
          <div class="form-group">
            <label for="new-email">New Email Address :</label>
            <input type="email" id="new-email" name="new_email" autocomplete="email" inputmode="email" placeholder="name@example.com" required>
            <p class="form-error" id="err-new-email" role="alert" aria-live="polite" hidden></p>
          </div>

          <div class="form-group">
            <label for="confirm-email">Confirm New Email Address :</label>
            <input type="email" id="confirm-email" name="confirm_email" autocomplete="email" inputmode="email" placeholder="name@example.com" required>
            <p class="form-error" id="err-confirm-email" role="alert" aria-live="polite" hidden></p>
          </div>

          <div class="form-group">
            <label for="password">Password :</label>
            <div class="input-password-wrap">
              <input type="password" id="password" name="password" autocomplete="current-password" value="$Forgelab1234567" required>
              <button type="button" class="btn-password-toggle" aria-label="パスワードを表示" title="パスワードを表示" data-target="password">
                <span class="icon-eye-open" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
                <span class="icon-eye-closed" aria-hidden="true" hidden>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </span>
              </button>
            </div>
            <p class="form-error" id="err-password" role="alert" aria-live="polite" hidden></p>
          </div>
        </div>

        <div class="form-actions profile-actions">
          <button type="submit" class="btn-submit btn-register profile-save-button">メールアドレスを更新</button>
        </div>

  <div class="lang-select-wrap" id="lang-select-wrap" data-url-en="../en/setting/change_email_edit.html" data-url-ja="change_email_edit.html">
    <button type="button" class="lang-select-btn" id="lang-select-btn" aria-expanded="false" aria-haspopup="listbox" aria-label="言語を選択">
      <span class="lang-code" aria-hidden="true">JP</span>
      <span class="lang-name">Japanese</span>
      <span class="lang-chevron" aria-hidden="true"></span>
    </button>
    <div class="lang-select-dropdown" id="lang-select-dropdown" role="listbox" aria-label="言語オプション" hidden>
      <button type="button" class="lang-option lang-option-ja lang-option-active" role="option" data-lang="ja">JP - Japanese</button>
      <button type="button" class="lang-option lang-option-en" role="option" data-lang="en">EN - English</button>
    </div>

  <script>
    (function () {
      var STORAGE_KEY = 'kpi-office-mode';
      var bodyEl = document.getElementById('body-el');
      var btnModeToggle = document.getElementById('btn-mode-toggle');
      var btnModeText = document.getElementById('btn-mode-text');
      var settingsOfficeLabel = document.getElementById('settings-office-label');
      function updateModeButton() {
        if (!btnModeText || !btnModeToggle) return;
        var isOffice = bodyEl && bodyEl.classList.contains('office-mode');
        btnModeText.textContent = isOffice ? 'SCI-FI MODE' : 'OFFICE MODE';
        btnModeToggle.setAttribute('aria-label', isOffice ? 'Sci-Fi Mode に切り替え' : 'Office Mode に切り替え');
        if (settingsOfficeLabel) {
          settingsOfficeLabel.textContent = isOffice ? 'Sci-Fi Mode' : 'Office Mode';
        }
      }
      if (bodyEl && btnModeToggle) {
        if (sessionStorage.getItem(STORAGE_KEY) === '1') {
          bodyEl.classList.add('office-mode');
        }
        btnModeToggle.addEventListener('click', function (e) {
          e.preventDefault();
          bodyEl.classList.toggle('office-mode');
          if (bodyEl.classList.contains('office-mode')) {
            sessionStorage.setItem(STORAGE_KEY, '1');
          } else {
            sessionStorage.removeItem(STORAGE_KEY);
          }
          updateModeButton();
        });
        updateModeButton();
      }
    })();
    (function () {
      var menuBtn = document.querySelector('.icon-button-menu');
      var dropdown = document.getElementById('settings-dropdown');
      var officeToggle = document.getElementById('settings-office-toggle');
      if (!menuBtn || !dropdown) return;

      menuBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        dropdown.hidden = !dropdown.hidden;
      });

      if (officeToggle) {
        officeToggle.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          var modeBtn = document.getElementById('btn-mode-toggle');
          if (modeBtn) {
            modeBtn.click();
          }
        });
      }

      dropdown.addEventListener('click', function (e) {
        e.stopPropagation();
      });

      document.addEventListener('click', function () {
        dropdown.hidden = true;
      });
    })();
    (function () {
      var gearBtn = document.getElementById('btn-account-settings');
      var accountPopup = document.getElementById('account-settings-popup');
      var menuDropdown = document.getElementById('settings-dropdown');
      if (!gearBtn || !accountPopup) return;

      gearBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = !accountPopup.hidden;
        accountPopup.hidden = isOpen;
        gearBtn.setAttribute('aria-expanded', !isOpen);
        if (!isOpen && menuDropdown) menuDropdown.hidden = true;
      });

      accountPopup.addEventListener('click', function (e) {
        e.stopPropagation();
      });

      document.addEventListener('click', function () {
        accountPopup.hidden = true;
        gearBtn.setAttribute('aria-expanded', 'false');
      });
    })();
    (function () {
      var trigger = document.getElementById('workspace-trigger');
      var popup = document.getElementById('workspace-popup');
      if (!trigger || !popup) return;

      trigger.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = !popup.hidden;
        popup.hidden = isOpen;
        trigger.setAttribute('aria-expanded', !isOpen);
      });

      popup.addEventListener('click', function (e) {
        e.stopPropagation();
      });

      document.addEventListener('click', function () {
        popup.hidden = true;
        trigger.setAttribute('aria-expanded', 'false');
      });
    })();
    (function () {
      var langBtn = document.getElementById('lang-select-btn');
      var langDropdown = document.getElementById('lang-select-dropdown');
      var langOptions = document.querySelectorAll('.lang-option');
      var langWrap = document.getElementById('lang-select-wrap');
      if (!langBtn || !langDropdown || !langWrap) return;

      langBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = !langDropdown.hidden;
        langDropdown.hidden = isOpen;
        langBtn.setAttribute('aria-expanded', !isOpen);
      });

      document.addEventListener('click', function () {
        langDropdown.hidden = true;
        langBtn.setAttribute('aria-expanded', 'false');
      });

      var urlEn = langWrap.getAttribute('data-url-en');
      var urlJa = langWrap.getAttribute('data-url-ja');
      var bodyElForLang = document.getElementById('body-el');

      langOptions.forEach(function (opt) {
        opt.addEventListener('click', function (e) {
          e.stopPropagation();
          if (bodyElForLang && bodyElForLang.classList.contains('office-mode')) {
            sessionStorage.setItem('kpi-office-mode', '1');
          }
          var lang = this.getAttribute('data-lang');
          var href = (lang === 'ja' && urlJa) ? urlJa : (lang === 'en' && urlEn) ? urlEn : null;
          if (href) window.location.href = href;
        });
      });
    })();
    (function () {
      var backTop = document.getElementById('footerBackToTop');
      if (!backTop) return;
      backTop.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();
    (function () {
      var el = document.getElementById('current-email');
      if (!el) return;

      var email = '';
      try {
        var raw = localStorage.getItem('kpi-profile-last');
        if (raw) {
          var data = JSON.parse(raw);
          email = (data && data.email) ? String(data.email) : '';
        }
      } catch (e) {}
      email = (email || '').trim() || 's.matsushita@forge-laboratory.com';
      el.textContent = email;
    })();
    (function () {
      var form = document.getElementById('change-email-form');
      if (!form) return;

      var newEmailEl = document.getElementById('new-email');
      var confirmEl = document.getElementById('confirm-email');
      var passwordEl = document.getElementById('password');

      var errNew = document.getElementById('err-new-email');
      var errConfirm = document.getElementById('err-confirm-email');
      var errPw = document.getElementById('err-password');

      function setErr(el, msg) {
        if (!el) return;
        el.textContent = msg || '';
        el.hidden = !msg;
      }

      function norm(v) {
        return String(v || '').trim();
      }

      function isEmailLike(v) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        setErr(errNew, '');
        setErr(errConfirm, '');
        setErr(errPw, '');

        var newEmail = norm(newEmailEl && newEmailEl.value);
        var confirmEmail = norm(confirmEl && confirmEl.value);
        var pw = norm(passwordEl && passwordEl.value);

        var hasError = false;

        if (!newEmail) {
          setErr(errNew, '新しいメールアドレスを入力してください。');
          hasError = true;
        } else if (!isEmailLike(newEmail)) {
          setErr(errNew, 'メールアドレスの形式が正しくありません。');
          hasError = true;
        }

        if (!confirmEmail) {
          setErr(errConfirm, '確認用メールアドレスを入力してください。');
          hasError = true;
        } else if (newEmail && confirmEmail && newEmail !== confirmEmail) {
          setErr(errConfirm, 'メールアドレスが一致しません。');
          hasError = true;
        }

        if (!pw) {
          setErr(errPw, 'パスワードを入力してください。');
          hasError = true;
        }

        if (hasError) return;

        try {
          var raw = localStorage.getItem('kpi-profile-last');
          var data = raw ? JSON.parse(raw) : {};
          if (!data || typeof data !== 'object') data = {};
          data.email = newEmail;
          localStorage.setItem('kpi-profile-last', JSON.stringify(data));
          sessionStorage.setItem('kpi-email-change-success', '1');
        } catch (err) {
          return;
        }

        window.location.href = 'change_email.html';
      });
    })();
    (function () {
      /* Password visibility toggle (eye icon) */
      document.querySelectorAll('.btn-password-toggle').forEach(function (btn) {
        var targetId = btn.getAttribute('data-target');
        var input = targetId ? document.getElementById(targetId) : null;
        var openEl = btn.querySelector('.icon-eye-open');
        var closedEl = btn.querySelector('.icon-eye-closed');
        if (!input || !openEl || !closedEl) return;
        btn.addEventListener('click', function () {
          var isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          openEl.hidden = isPassword;
          closedEl.hidden = !isPassword;
          btn.setAttribute('aria-label', isPassword ? 'パスワードを隠す' : 'パスワードを表示');
          btn.setAttribute('title', isPassword ? 'パスワードを隠す' : 'パスワードを表示');
        });
      });
    })();
  </script>
