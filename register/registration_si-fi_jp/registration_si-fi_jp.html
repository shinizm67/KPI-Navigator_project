<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Navigator - 登録 | FORGE LABORATORY WEB SERVICE</title>
  <!-- Si-Fi 日本語: BIZ UDPGothic（全体） + Orbitron（KPI Navigator タイトルのみ） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDP+Gothic:wght@400;500;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body class="si-fi registration-page">
  <!-- Navigation Menu（画面幅全体） -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <a href="https://forge-laboratory.com/" class="logo-link" aria-label="FORGE LABORATORY - トップページ" target="_blank" rel="noopener noreferrer">
          <img src="../../images/forge_lab_logo.png" alt="FORGE LABORATORY" class="logo-img">
        </a>
      </div>
      <div class="header-actions">
        <a href="#" class="btn-mode" aria-label="オフィスモードに切り替え">
          <span class="btn-mode-frame">
            <img src="../../images/button_frame.svg" alt="" class="btn-mode-frame-img" aria-hidden="true">
            <span class="btn-mode-text">オフィスモード</span>
          </span>
        </a>
      </div>
    </div>
  </header>

  <div class="page-wrap" style="max-width: 1200px;">
    <!-- Main -->
    <main class="main-content">
      <div class="registration-plan">
        <h1 class="registration-plan-title" id="plan-title">KPI Navigator Basic</h1>
        <p class="registration-plan-price" id="plan-price">¥500/月</p>
        <p class="registration-plan-cancel" id="plan-cancel">いつでも解約可能</p>
      </div>
      <h2 class="page-title">
        <span class="title-sub">登録</span>
      </h2>

      <form class="registration-form" action="#" method="post" id="registration-form">
        <div class="form-group">
          <label for="name">お名前 / ニックネーム可 :</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="company">会社名 / 屋号 :</label>
          <input type="text" id="company" name="company" autocomplete="organization">
        </div>
        <div class="form-group">
          <label for="email">Eメールアドレス :</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">パスワード :</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
          <p class="form-hint">*8文字以上で、英字・数字・記号を含めてください</p>
        </div>
        <div class="form-agreement">
          <label class="form-agreement-label" for="agree-terms-jp">
            <input type="checkbox" id="agree-terms-jp" name="agree_terms" class="form-agreement-checkbox" required>
            <span class="form-agreement-text">利用規約およびプライバシーポリシーに同意します</span>
          </label>
          <p class="form-agreement-links">
            <a href="../../legal/terms/" class="form-agreement-link" target="_blank" rel="noopener noreferrer">利用規約を表示</a>
            <span class="form-agreement-sep"> / </span>
            <a href="../../legal/privacy/" class="form-agreement-link" target="_blank" rel="noopener noreferrer">プライバシーポリシーを表示</a>
          </p>
          <div class="form-actions">
            <button type="submit" class="btn-submit btn-register" id="btn-register" disabled>登録する</button>
          </div>
        </div>
      </form>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-separator"></div>
      <div class="footer-logo">
        <a href="https://forge-laboratory.com/" class="logo-link" aria-label="FORGE LABORATORY - トップページ" target="_blank" rel="noopener noreferrer">
          <img src="../../images/forge_lab_logo.png" alt="FORGE LABORATORY" class="logo-img">
        </a>
      </div>
      <p class="footer-copy">© 2025 Forge-Laboratory. All rights reserved.</p>
    </footer>
  </div>

  <!-- Language selector（画面右下・Forge Lab 風）・相互リンク用 data-url 指定 -->
  <div class="lang-select-wrap" id="lang-select-wrap" data-url-en="../../en/register/registration_si-fi_en.html" data-url-ja="registration_si-fi_jp.html">
    <button type="button" class="lang-select-btn" id="lang-select-btn" aria-expanded="false" aria-haspopup="listbox" aria-label="言語を選択">
      <span class="lang-code" aria-hidden="true">JP</span>
      <span class="lang-name">Japanese</span>
      <span class="lang-chevron" aria-hidden="true"></span>
    </button>
    <div class="lang-select-dropdown" id="lang-select-dropdown" role="listbox" aria-label="言語オプション" hidden>
      <button type="button" class="lang-option lang-option-ja lang-option-active" role="option" data-lang="ja">JP - Japanese</button>
      <button type="button" class="lang-option lang-option-en" role="option" data-lang="en">EN - English</button>
    </div>
  </div>

  <script src="../script.js"></script>
</body>
</html>
