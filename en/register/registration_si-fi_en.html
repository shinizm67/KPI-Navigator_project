<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Navigator - Registration | FORGE LABORATORY WEB SERVICE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDP+Gothic:wght@400;500;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="si-fi registration-page">
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <a href="https://forge-laboratory.com/en" class="logo-link" aria-label="FORGE LABORATORY - Top page" target="_blank" rel="noopener noreferrer">
          <img src="../../images/forge_lab_logo.png" alt="FORGE LABORATORY" class="logo-img">
        </a>
      </div>
      <div class="header-actions">
        <a href="#" class="btn-mode" aria-label="Switch to Office Mode">
          <span class="btn-mode-frame">
            <img src="../../images/button_frame.svg" alt="" class="btn-mode-frame-img" aria-hidden="true">
            <span class="btn-mode-text">OFFICE MODE</span>
          </span>
        </a>
      </div>
    </div>
  </header>

  <div class="page-wrap" style="max-width: 1200px;">
    <main class="main-content">
      <h1 class="page-title">
        <span class="title-main">KPI Navigator</span>
        <span class="title-sub">Registration</span>
      </h1>

      <form class="registration-form" action="#" method="post" id="registration-form">
        <div class="form-group">
          <label for="name">Name :</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="company">Company Name / Store Name :</label>
          <input type="text" id="company" name="company" autocomplete="organization">
        </div>
        <div class="form-group">
          <label for="email">Email Address :</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password :</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
          <p class="form-hint">*At least 8 characters, including letters, numbers, and symbols</p>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit">Register</button>
        </div>
      </form>
    </main>

    <footer class="site-footer">
      <div class="footer-separator"></div>
      <div class="footer-logo">
        <a href="https://forge-laboratory.com/en" class="logo-link" aria-label="FORGE LABORATORY - Top page" target="_blank" rel="noopener noreferrer">
          <img src="../../images/forge_lab_logo.png" alt="FORGE LABORATORY" class="logo-img">
        </a>
      </div>
      <p class="footer-copy">© 2025 Forge-Laboratory. All rights reserved.</p>
    </footer>
  </div>

  <div class="lang-select-wrap" id="lang-select-wrap" data-url-en="registration_si-fi_en.html" data-url-ja="../../register/registration_si-fi_jp/registration_si-fi_jp.html">
    <button type="button" class="lang-select-btn" id="lang-select-btn" aria-expanded="false" aria-haspopup="listbox" aria-label="Select language">
      <span class="lang-code" aria-hidden="true">EN</span>
      <span class="lang-name">English</span>
      <span class="lang-chevron" aria-hidden="true"></span>
    </button>
    <div class="lang-select-dropdown" id="lang-select-dropdown" role="listbox" aria-label="Language options" hidden>
      <button type="button" class="lang-option lang-option-ja" role="option" data-lang="ja">JP - Japanese</button>
      <button type="button" class="lang-option lang-option-en lang-option-active" role="option" data-lang="en">EN - English</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
