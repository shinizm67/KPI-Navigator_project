<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Navigator - Registration | FORGE LABORATORY WEB SERVICE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDP+Gothic:wght@400;500;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="si-fi registration-page" id="body-el">
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <a href="https://forge-laboratory.com/en" class="logo-link" aria-label="FORGE LABORATORY - Top page" target="_blank" rel="noopener noreferrer">
          <img src="../../images/forge_lab_logo.png" alt="FORGE LABORATORY" class="logo-img">
        </a>
      </div>
      <div class="header-actions">
        <a href="#" class="btn-mode" id="btn-mode-toggle" role="button" aria-label="Switch to Office Mode">
          <span class="btn-mode-frame">
            <img src="../../images/button_frame.svg" alt="" class="btn-mode-frame-img" aria-hidden="true">
            <span class="btn-mode-text" id="btn-mode-text">OFFICE MODE</span>
          </span>
        </a>
      </div>
    </div>
  </header>

  <div class="page-wrap" style="max-width: 1200px;">
    <main class="main-content">
      <div class="registration-plan">
        <h1 class="registration-plan-title" id="plan-title">KPI Navigator Basic</h1>
        <p class="registration-plan-price" id="plan-price">$5 / Month</p>
        <p class="registration-plan-cancel">Cancel anytime</p>
      </div>
      <h2 class="page-title">
        <span class="title-sub">Registration</span>
      </h2>

      <form class="registration-form" action="#" method="post" id="registration-form">
        <div class="form-group">
          <label for="name">Name :</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="company">Company Name / Store Name :</label>
          <input type="text" id="company" name="company" autocomplete="organization">
        </div>
        <div class="form-group">
          <label for="email">Email Address :</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password :</label>
          <div class="input-password-wrap">
            <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
            <button type="button" class="btn-password-toggle" aria-label="Show password" title="Show password" data-target="password">
              <span class="icon-eye-open" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
              <span class="icon-eye-closed" aria-hidden="true" hidden>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </span>
            </button>
          </div>
          <p class="form-hint">*At least 8 characters, including letters, numbers, and symbols</p>
        </div>
        <div class="form-group">
          <label for="password-confirm">Confirm Password :</label>
          <div class="input-password-wrap">
            <input type="password" id="password-confirm" name="password_confirm" required autocomplete="new-password" minlength="8" placeholder="">
            <button type="button" class="btn-password-toggle" aria-label="Show password" title="Show password" data-target="password-confirm">
              <span class="icon-eye-open" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
              <span class="icon-eye-closed" aria-hidden="true" hidden>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </span>
            </button>
          </div>
        </div>

        <div class="form-agreement">
          <label class="form-agreement-label" for="agree-terms">
            <input type="checkbox" id="agree-terms" name="agree_terms" class="form-agreement-checkbox" required>
            <span class="form-agreement-text">I agree to the Terms of Service and Privacy Policy</span>
          </label>
          <p class="form-agreement-links">
            <a href="../legal/terms/" class="form-agreement-link" target="_blank" rel="noopener noreferrer">View Terms</a>
            <a href="../legal/privacy/" class="form-agreement-link" target="_blank" rel="noopener noreferrer">View Privacy</a>
          </p>
          <div class="form-actions">
            <button type="submit" class="btn-submit btn-register" id="btn-register" disabled>Register</button>
          </div>
        </div>
      </form>
    </main>

    <footer class="site-footer">
      <div class="footer-separator"></div>
      <div class="footer-logo">
        <a href="https://forge-laboratory.com/en" class="logo-link" aria-label="FORGE LABORATORY - Top page" target="_blank" rel="noopener noreferrer">
          <img src="../../images/forge_lab_logo.png" alt="FORGE LABORATORY" class="logo-img">
        </a>
      </div>
      <p class="footer-copy">© 2025 Forge-Laboratory. All rights reserved.</p>
    </footer>
  </div>

  <div class="lang-select-wrap" id="lang-select-wrap" data-url-en="registration_si-fi_en.html" data-url-ja="../../register/registration_si-fi_jp/registration_si-fi_jp.html">
    <button type="button" class="lang-select-btn" id="lang-select-btn" aria-expanded="false" aria-haspopup="listbox" aria-label="Select language">
      <span class="lang-code" aria-hidden="true">EN</span>
      <span class="lang-name">English</span>
      <span class="lang-chevron" aria-hidden="true"></span>
    </button>
    <div class="lang-select-dropdown" id="lang-select-dropdown" role="listbox" aria-label="Language options" hidden>
      <button type="button" class="lang-option lang-option-ja" role="option" data-lang="ja">JP - Japanese</button>
      <button type="button" class="lang-option lang-option-en lang-option-active" role="option" data-lang="en">EN - English</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
