<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log IN | KPI Navigator | FORGE LABORATORY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDP+Gothic:wght@400;500;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../register/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="si-fi login-page" id="body-el">
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <a href="https://forge-laboratory.com/en" class="logo-link" aria-label="FORGE LABORATORY - Top page" target="_blank" rel="noopener noreferrer">
          <img src="../../images/forge_lab_logo.png" alt="FORGE LABORATORY" class="logo-img">
        </a>
      </div>
      <div class="header-actions">
        <a href="#" class="btn-mode" id="btn-mode-toggle" role="button" aria-label="Switch to Office Mode">
          <span class="btn-mode-frame">
            <img src="../../images/button_frame.svg" alt="" class="btn-mode-frame-img" aria-hidden="true">
            <span class="btn-mode-text" id="btn-mode-text">OFFICE MODE</span>
          </span>
        </a>
      </div>
    </div>
  </header>

  <div class="page-wrap login-wrap">
    <main class="login-content">
      <h1 class="login-title-main">KPI Navigator</h1>
      <h2 class="login-title-sub">Log IN</h2>

      <form class="login-form" action="#" method="post" id="login-form">
        <div class="form-group">
          <label for="user-id">USER ID / Mail Address :</label>
          <input type="text" id="user-id" name="user_id" required autocomplete="username" placeholder="">
        </div>
        <div class="form-group">
          <label for="password">Pass Word :</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" minlength="8" placeholder="">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit btn-login" id="btn-login" disabled>Log IN</button>
        </div>
      </form>
    </main>

    <footer class="site-footer">
      <div class="footer-separator"></div>
      <div class="footer-logo">
        <a href="https://forge-laboratory.com/en" class="logo-link" aria-label="FORGE LABORATORY - Top page" target="_blank" rel="noopener noreferrer">
          <img src="../../images/forge_lab_logo.png" alt="FORGE LABORATORY" class="logo-img">
        </a>
      </div>
      <p class="footer-copy">© 2025 Forge-Laboratory. All rights reserved.</p>
    </footer>
  </div>

  <div class="lang-select-wrap" id="lang-select-wrap" data-url-en="index.html" data-url-ja="../../login/index.html">
    <button type="button" class="lang-select-btn" id="lang-select-btn" aria-expanded="false" aria-haspopup="listbox" aria-label="Select language">
      <span class="lang-code" aria-hidden="true">EN</span>
      <span class="lang-name">English</span>
      <span class="lang-chevron" aria-hidden="true"></span>
    </button>
    <div class="lang-select-dropdown" id="lang-select-dropdown" role="listbox" aria-label="Language options" hidden>
      <button type="button" class="lang-option lang-option-ja" role="option" data-lang="ja">JP - Japanese</button>
      <button type="button" class="lang-option lang-option-en lang-option-active" role="option" data-lang="en">EN - English</button>
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = 'kpi-office-mode';
      var bodyEl = document.getElementById('body-el');
      var btnModeToggle = document.getElementById('btn-mode-toggle');
      var btnModeText = document.getElementById('btn-mode-text');
      function updateModeButton() {
        if (!btnModeText || !btnModeToggle) return;
        var isOffice = bodyEl && bodyEl.classList.contains('office-mode');
        btnModeText.textContent = isOffice ? 'SCI-FI MODE' : 'OFFICE MODE';
        btnModeToggle.setAttribute('aria-label', isOffice ? 'Switch to Sci-Fi Mode' : 'Switch to Office Mode');
      }
      if (bodyEl && btnModeToggle) {
        if (sessionStorage.getItem(STORAGE_KEY) === '1') {
          bodyEl.classList.add('office-mode');
        }
        btnModeToggle.addEventListener('click', function (e) {
          e.preventDefault();
          bodyEl.classList.toggle('office-mode');
          if (bodyEl.classList.contains('office-mode')) {
            sessionStorage.setItem(STORAGE_KEY, '1');
          } else {
            sessionStorage.removeItem(STORAGE_KEY);
          }
          updateModeButton();
        });
        updateModeButton();
      }
    })();
    (function () {
      var userId = document.getElementById('user-id');
      var password = document.getElementById('password');
      var btnLogin = document.getElementById('btn-login');

      function checkActive() {
        var idOk = userId.value.trim().length > 0;
        var pwOk = password.value.length >= 8;
        btnLogin.disabled = !(idOk && pwOk);
      }

      if (userId && password && btnLogin) {
        userId.addEventListener('input', checkActive);
        userId.addEventListener('change', checkActive);
        password.addEventListener('input', checkActive);
        password.addEventListener('change', checkActive);
      }

      /* Language selector（Registration と同じ動作） */
      var langBtn = document.getElementById('lang-select-btn');
      var langDropdown = document.getElementById('lang-select-dropdown');
      var langOptions = document.querySelectorAll('.lang-option');
      var langWrap = document.getElementById('lang-select-wrap');

      if (langBtn && langDropdown) {
        langBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          var isOpen = !langDropdown.hidden;
          langDropdown.hidden = isOpen;
          langBtn.setAttribute('aria-expanded', !isOpen);
        });
        document.addEventListener('click', function () {
          langDropdown.hidden = true;
          langBtn.setAttribute('aria-expanded', 'false');
        });
        var urlEn = langWrap && langWrap.getAttribute('data-url-en');
        var urlJa = langWrap && langWrap.getAttribute('data-url-ja');
        var bodyElForLang = document.getElementById('body-el');
        langOptions.forEach(function (opt) {
          opt.addEventListener('click', function (e) {
            e.stopPropagation();
            if (bodyElForLang && bodyElForLang.classList.contains('office-mode')) {
              sessionStorage.setItem('kpi-office-mode', '1');
            }
            var lang = this.getAttribute('data-lang');
            var href = (lang === 'ja' && urlJa) ? urlJa : (lang === 'en' && urlEn) ? urlEn : null;
            if (href) window.location.href = href;
          });
        });
      }
    })();
  </script>
</body>
</html>
