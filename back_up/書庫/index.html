<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kpi navigator</title>
  <link rel="stylesheet" href="style.css"> <!-- 外部CSSの読み込み -->
</head>
<body>
  <nav class="navigation-menu">
    <div class="menu-left">
        <button>年次</button>
        <button>月次</button>
        <button>日次</button>
        <button>支出管理</button>
    </div>
    <div class="menu-right">
        <button>基本設定</button>
        <button>平均値</button>
    </div>        
</nav>
<div class="calendar-and-date">
  <img src="image/calender_image.png" alt="カレンダー" class="calendar-icon" />
  

    <!-- 年月日をまとめたボックス -->
    <div class="date-combine-box">

      <!-- ▼ 年 -->
      <div class="date-unit"> <!-- 年のブロック -->
        <div class="date-columns"> <!-- 左：矢印 / 右：数値 -->
          <div class="date-arrows">
            <button class="arrow up" onclick="changeDate('year', 1)">▲</button>
            <button class="arrow down" onclick="changeDate('year', -1)">▼</button>
          </div>
          <select id="year-select" class="date-select"></select>
        </div>
      </div> <!-- .date-unit -->
      <div class="divider"></div>

      <!-- ▼ 月 -->
      <div class="date-unit">
        <div class="date-columns">
          <div class="date-arrows">
            <button class="arrow up" onclick="changeDate('month', 1)">▲</button>
            <button class="arrow down" onclick="changeDate('month', -1)">▼</button>
          </div>
          <select id="month-select" class="date-select"></select>
        </div>
      </div> <!-- .date-unit -->
      <div class="divider"></div>

      <!-- ▼ 日 -->
      <div class="date-unit">
        <div class="date-columns">
          <div class="date-arrows">
            <button class="arrow up" onclick="changeDate('day', 1)">▲</button>
            <button class="arrow down" onclick="changeDate('day', -1)">▼</button>
          </div>
          <select id="day-select" class="date-select"></select>
        </div>
      </div> <!-- .date-unit -->     
</div> <!-- .date-combine-box -->
  
<!-- 今日ボタン -->
<button class="today-button" onclick="goToToday()">今日</button>

</div> <!-- .calendar-and-date -->
 
<script src="script.js"></script>
</body>
</html>
